name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: Linux x64
            os: ubuntu-latest
          - name: macOS Apple Silicon
            os: macos-15
          - name: macOS Intel
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source and LFS assets
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ./ChoirLauncher.sln

      - name: Build
        run: dotnet build ./ChoirLauncher.sln -c Release --no-restore

      - name: Build Windows installer project
        if: runner.os == 'Windows'
        run: dotnet build ./Source/ChoirLauncher.Installer/ChoirLauncher.Installer.csproj -c Release
